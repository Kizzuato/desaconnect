name: Deploy to Amazon ECS

on:
  push:
    branches:
      - main

env:
  # Sesuaikan nilai-nilai berikut dengan resource AWS Anda
  AWS_REGION: ap-southeast-2                   # Region AWS, misalnya ap-southeast-1 (Singapura)
  ECR_REPOSITORY: desaconnect                  # Nama repositori Amazon ECR Anda
  ECS_SERVICE: desaconnect-service             # Nama service Amazon ECS Fargate Anda
  ECS_CLUSTER: desaconnect-cluster             # Nama cluster Amazon ECS Anda
  ECS_TASK_DEFINITION: .aws/task-definition.json # Path ke file konfigurasi task definition ECS Anda
  CONTAINER_NAME: desaconnect-app              # Nama container di dalam containerDefinitions task definition

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout Kode Repositori
      uses: actions/checkout@v3

    - name: Setup AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login ke Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, tag, dan push image Docker ke Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }} # Menggunakan commit hash sebagai tag (best practice)
      run: |
        echo "Building image..."
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        
        echo "Pushing image..."
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Sisipkan Image ID baru ke dalam Amazon ECS Task Definition
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: ${{ env.ECS_TASK_DEFINITION }}
        container-name: ${{ env.CONTAINER_NAME }}
        image: ${{ steps.build-image.outputs.image }}

    - name: Deploy Task Definition baru ke Amazon ECS Fargate
      uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true

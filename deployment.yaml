apiVersion: apps/v1
kind: Deployment
metadata:
  name: pengaduan-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pengaduan
  template:
    metadata:
      labels:
        app: pengaduan
    spec:
      containers:
        - name: pengaduan
          image: pengaduanacr.azurecr.io/pengaduan-app:v2
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "200m"
            limits:
              cpu: "500m"
          env:
            - name: DB_HOST
              value: "db"
            - name: DB_USER
              value: "postgres"
            - name: DB_PASS
              value: "Azazel032007"
            - name: DB_NAME
              value: "portal_desa"
            - name: DB_PORT
              value: "5432"
            - name: AZURE_STORAGE_CONNECTION_STRING
              value: "<YOUR_AZURE_STORAGE_CONNECTION_STRING>"
            - name: AZURE_STORAGE_CONTAINER_NAME
              value: "reports"

version: '3.8'

services:
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASS=Azazel032007
      - DB_NAME=portal_desa
      - DB_PORT=5432
      - AWS_REGION=ap-southeast-2
      - S3_BUCKET=pengaduan-uploads-bucket
      - CLOUDFRONT_URL=https://dot14cul6zftn.cloudfront.net
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=Azazel032007
      - POSTGRES_DB=portal_desa
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
